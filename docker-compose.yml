services:
  db:
    image: postgres:16-alpine
    container_name: respublika-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER required (see .env.example)}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required (see .env.example)}
      POSTGRES_DB: ${DB_NAME:-respublika_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: respublika-cache
    ports:
      - "6379:6379"

volumes:
  pgdata:
