services:
  db:
    image: postgres:16-alpine
    container_name: respublika-db
    restart: always
    environment:
      POSTGRES_USER: respublika_admin
      POSTGRES_PASSWORD: Nipanimay666
      POSTGRES_DB: respublika_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respublika_admin -d respublika_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: respublika-cache
    ports:
      - "6379:6379"

volumes:
  pgdata:
