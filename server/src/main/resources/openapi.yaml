openapi: 3.0.3
info:
  title: ResPublika API
  description: API de transparence parlementaire - Assemblée nationale française
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Serveur local

tags:
  - name: Députés
    description: Recherche, profils et historique de vote des élus
  - name: Scrutins
    description: Détail des votes et analyse par groupe politique
  - name: Dossiers
    description: Dossiers législatifs (lois, propositions, motions) et scrutins associés
  - name: Éthique
    description: Déports et transparence

paths:
  /api/deputes:
    get:
      tags: [Députés]
      summary: Liste paginée des députés
      description: Retourne la liste des députés avec filtres optionnels par nom ou groupe politique.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: groupe
          in: query
          description: Filtrer par UID du groupe politique (ex. PO845425)
          schema: { type: string }
        - name: nom
          in: query
          description: Recherche par nom (insensible à la casse)
          schema: { type: string }
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                type: object
                properties:
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  total_pages: { type: integer }
                  deputes:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeputeResume'

  /api/deputes/{id}:
    get:
      tags: [Députés]
      summary: Profil complet d'un député
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant AN du député (ex. PA1008)
          schema: { type: string }
      responses:
        '200':
          description: Profil avec stats de vote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeputeProfil'
        '404':
          description: Député non trouvé

  /api/deputes/{id}/votes:
    get:
      tags: [Députés]
      summary: Historique de vote d'un député
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        '200':
          description: Liste paginée des votes
          content:
            application/json:
              schema:
                type: object
                properties:
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  votes:
                    type: array
                    items:
                      $ref: '#/components/schemas/VoteDepute'
        '404':
          description: Député non trouvé

  /api/deputes/{id}/top-dissidences:
    get:
      tags: [Députés]
      summary: Votes dissidents par rapport au groupe
      description: Retourne les scrutins où le député a voté différemment de la position majoritaire de son groupe politique.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        '200':
          description: Liste des dissidences
          content:
            application/json:
              schema:
                type: object
                properties:
                  depute_id: { type: string }
                  nom: { type: string }
                  groupe_uid: { type: string }
                  nb_dissidences: { type: integer }
                  dissidences:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dissidence'
        '404':
          description: Député non trouvé

  /api/scrutins/{uid}/full:
    get:
      tags: [Scrutins]
      summary: Détail complet d'un scrutin avec synthèse par groupe
      description: "Retourne le résultat du vote avec pour chaque groupe : nombre de pour/contre/abstentions, participation %, et une synthèse textuelle."
      parameters:
        - name: uid
          in: path
          required: true
          description: UID du scrutin (ex. VTANR5L17V1)
          schema: { type: string }
      responses:
        '200':
          description: Détail complet du scrutin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrutinFull'
        '404':
          description: Scrutin non trouvé

  /api/scrutins/{uid}/insights:
    get:
      tags: [Scrutins]
      summary: Insights dérivés pour un scrutin
      description: |
        Retourne les insights pré-calculés (titre court, type d'objet, consensualité,
        groupes demandeurs, taux de participation) pour un scrutin donné.
        Les insights sont produits en amont par un job de dérivation et stockés dans
        la table `vote_insights`.
      parameters:
        - name: uid
          in: path
          required: true
          description: UID du scrutin (ex. VTANR5L17V3)
          schema: { type: string }
      responses:
        '200':
          description: Insights du scrutin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteInsightResponse'
        '404':
          description: |
            Scrutin introuvable, ou scrutin existant sans insights calculés.
            Le champ `error` distingue les deux cas :
            - `scrutin_not_found` : aucun scrutin avec cet uid
            - `insights_not_computed` : scrutin trouvé mais pas de ligne dans vote_insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [scrutin_not_found, insights_not_computed]
                  uid: { type: string }

  /api/scrutins/recherche:
    get:
      tags: [Scrutins]
      summary: Recherche textuelle dans les scrutins
      parameters:
        - name: q
          in: query
          required: true
          description: Termes de recherche (ex. retraites, immigration, budget)
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Résultats de recherche paginés
          content:
            application/json:
              schema:
                type: object
                properties:
                  query: { type: string }
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  total_pages: { type: integer }
                  scrutins:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScrutinResume'

  /api/dossiers:
    get:
      tags: [Dossiers]
      summary: Liste paginée des dossiers législatifs
      description: |
        Retourne les dossiers législatifs (légalisature 17 par défaut) avec
        filtres optionnels par état, date plancher de dernière décision, et
        recherche textuelle sur le titre.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: etat
          in: query
          description: Liste d'états séparés par des virgules
          schema:
            type: string
            example: "EN_COURS,ADOPTE,PROMULGUE"
        - name: since
          in: query
          description: Filtre les dossiers dont la dernière décision est ≥ cette date (YYYY-MM-DD)
          schema: { type: string, format: date }
        - name: q
          in: query
          description: Recherche textuelle insensible à la casse sur le titre
          schema: { type: string }
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                type: object
                properties:
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  total_pages: { type: integer }
                  dossiers:
                    type: array
                    items:
                      $ref: '#/components/schemas/DossierResume'
        '400':
          description: Paramètre `since` mal formé
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, enum: [invalid_since] }
                  hint: { type: string }

  /api/dossiers/{uid}:
    get:
      tags: [Dossiers]
      summary: Détail d'un dossier législatif et premiers scrutins associés
      parameters:
        - name: uid
          in: path
          required: true
          description: UID du dossier (ex. DLR5L17N50168)
          schema: { type: string }
      responses:
        '200':
          description: Détail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DossierDetail'
        '404':
          description: Dossier inconnu
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, enum: [dossier_not_found] }
                  uid: { type: string }

  /api/dossiers/{uid}/scrutins:
    get:
      tags: [Dossiers]
      summary: Scrutins associés à un dossier (paginé)
      parameters:
        - name: uid
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: Scrutins paginés
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid: { type: string }
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  total_pages: { type: integer }
                  scrutins:
                    type: array
                    items:
                      $ref: '#/components/schemas/DossierScrutinSummary'
        '404':
          description: Dossier inconnu
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, enum: [dossier_not_found] }
                  uid: { type: string }

  /api/deports/latest:
    get:
      tags: [Éthique]
      summary: Derniers déports signalés
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Liste des derniers déports
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  deports:
                    type: array
                    items:
                      $ref: '#/components/schemas/Deport'

  /api/deputes/{id}/deports:
    get:
      tags: [Éthique]
      summary: Déports d'un député (Badge Éthique+)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Déports avec badge éthique
          content:
            application/json:
              schema:
                type: object
                properties:
                  depute_id: { type: string }
                  nom: { type: string }
                  nb_deports: { type: integer }
                  badge_ethique_plus: { type: boolean }
                  deports:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeportDetail'
        '404':
          description: Député non trouvé

components:
  schemas:
    DeputeResume:
      type: object
      properties:
        id_an: { type: string, example: "PA1008" }
        nom: { type: string, example: "Alain David" }
        groupe_uid: { type: string, example: "PO845419" }
        groupe_libelle: { type: string, example: "Socialistes et apparentés" }
        groupe_abrege: { type: string, example: "SOC" }
        couleur: { type: string, example: "#FF8080" }

    DeputeProfil:
      type: object
      properties:
        id_an: { type: string }
        nom: { type: string }
        groupe:
          type: object
          properties:
            uid: { type: string }
            libelle: { type: string }
            abrege: { type: string }
            couleur: { type: string }
        stats_votes:
          type: object
          properties:
            total: { type: integer }
            pour: { type: integer }
            contre: { type: integer }
            abstention: { type: integer }
            non_votant: { type: integer }
        nb_deports: { type: integer }

    VoteDepute:
      type: object
      properties:
        scrutin_uid: { type: string }
        titre: { type: string }
        date_vote: { type: string }
        sort_scrutin: { type: string }
        position: { type: string, enum: [pour, contre, abstention, non_votant] }
        par_delegation: { type: boolean }

    Dissidence:
      type: object
      properties:
        scrutin_uid: { type: string }
        titre: { type: string }
        date_vote: { type: string }
        sort_scrutin: { type: string }
        position_depute: { type: string }
        position_groupe: { type: string }

    ScrutinFull:
      type: object
      properties:
        uid: { type: string }
        titre: { type: string }
        date_vote: { type: string }
        sort: { type: string }
        nombre_votants: { type: integer }
        suffrages_exprimes: { type: integer }
        nbre_suffrages_requis: { type: integer }
        dossier_uid:
          type: string
          nullable: true
          description: |
            UID du dossier législatif parent quand le lien a pu être résolu.
            Null si le scrutin n'a pas (encore) été rattaché.
        dossier:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ScrutinDossierRef'
        groupes:
          type: array
          items:
            $ref: '#/components/schemas/VoteGroupe'
        insights:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/VoteInsightResponse'

    VoteGroupe:
      type: object
      properties:
        groupe_uid: { type: string }
        groupe_libelle: { type: string }
        groupe_abrege: { type: string }
        couleur: { type: string }
        nombre_membres: { type: integer }
        position_majoritaire: { type: string }
        pour: { type: integer }
        contre: { type: integer }
        abstentions: { type: integer }
        non_votants: { type: integer }
        participation_pct: { type: integer }
        synthese: { type: string, example: "90% du groupe LFI-NFP a voté POUR" }

    ScrutinResume:
      type: object
      properties:
        uid: { type: string }
        titre: { type: string }
        date_vote: { type: string }
        sort: { type: string }
        nombre_votants: { type: integer }
        insights:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/VoteInsightResponse'

    VoteInsightResponse:
      type: object
      required:
        - scrutin_uid
        - est_consensuel
        - demandeurs_groupes
        - insights_version
        - computed_at
      properties:
        scrutin_uid:
          type: string
          description: UID du scrutin (référence vers `scrutins.uid`)
          example: "VTANR5L17V3"
        titre_court:
          type: string
          nullable: true
          description: Version raccourcie et capitalisée du titre du scrutin
          example: "Création d'une commission d'enquête sur les manquements des politiques publiques de protection de l'enfance"
        type_objet:
          type: string
          nullable: true
          enum:
            - RESOLUTION_COMMISSION_ENQUETE
            - PROJET_LOI_ENSEMBLE
            - PROPOSITION_LOI_ENSEMBLE
            - AMENDEMENT
            - MOTION_CENSURE
            - DECLARATION_POLITIQUE_GENERALE
            - ARTICLE
            - AUTRE
          example: RESOLUTION_COMMISSION_ENQUETE
        est_consensuel:
          type: boolean
          description: True si ≥ 90% des suffrages exprimés vont dans la même direction (avec ≥ 50 exprimés)
          example: true
        demandeurs_groupes:
          type: array
          description: Groupes politiques à l'origine du scrutin (vide si aucun identifié)
          items: { type: string }
          example: ["La France insoumise - Nouveau Front Populaire"]
        taux_participation:
          type: number
          format: double
          nullable: true
          description: Ratio votants / total députés (0.0 à 1.0)
          example: 0.3535529715762274
        insights_version:
          type: integer
          description: Version du dériveur ayant produit ces insights (à comparer pour détecter une re-dérivation)
          example: 1
        computed_at:
          type: string
          description: Horodatage ISO-8601 de la dérivation
          example: "2026-04-26T19:45:12.123Z"

    DossierResume:
      type: object
      required: [uid, titre, type, etat, legislature, nb_scrutins]
      properties:
        uid: { type: string, example: "DLR5L17N50168" }
        titre: { type: string }
        titre_court:
          type: string
          nullable: true
        type:
          type: string
          enum:
            - LOI_ORDINAIRE
            - LOI_ORGANIQUE
            - PROPOSITION_RESOLUTION
            - MOTION_CENSURE
            - AUTRE
        etat:
          type: string
          enum: [DORMANT, EN_COURS, ADOPTE, REJETE, RETIRE, PROMULGUE]
        legislature:
          type: integer
          example: 17
        date_depot:
          type: string
          format: date
          nullable: true
        date_derniere_decision:
          type: string
          format: date
          nullable: true
        date_promulgation:
          type: string
          format: date
          nullable: true
        numero_loi:
          type: string
          nullable: true
        nb_scrutins:
          type: integer
          description: Nombre de scrutins rattachés à ce dossier (lien voteRef ou séance unique)

    DossierDetail:
      type: object
      properties:
        uid: { type: string }
        titre: { type: string }
        titre_court: { type: string, nullable: true }
        type:
          type: string
          enum:
            - LOI_ORDINAIRE
            - LOI_ORGANIQUE
            - PROPOSITION_RESOLUTION
            - MOTION_CENSURE
            - AUTRE
        etat:
          type: string
          enum: [DORMANT, EN_COURS, ADOPTE, REJETE, RETIRE, PROMULGUE]
        legislature: { type: integer }
        date_depot: { type: string, format: date, nullable: true }
        date_derniere_decision: { type: string, format: date, nullable: true }
        date_promulgation: { type: string, format: date, nullable: true }
        numero_loi: { type: string, nullable: true }
        scrutins:
          type: array
          items:
            $ref: '#/components/schemas/DossierScrutinSummary'

    DossierScrutinSummary:
      type: object
      properties:
        uid: { type: string }
        titre: { type: string }
        date_vote: { type: string }
        sort: { type: string, nullable: true }
        nombre_votants: { type: integer, nullable: true }

    ScrutinDossierRef:
      type: object
      properties:
        uid: { type: string }
        titre: { type: string }
        etat:
          type: string
          enum: [DORMANT, EN_COURS, ADOPTE, REJETE, RETIRE, PROMULGUE]

    Deport:
      type: object
      properties:
        uid: { type: string }
        depute_id: { type: string }
        depute_nom: { type: string }
        libelle_portee: { type: string }
        explication_html: { type: string }

    DeportDetail:
      type: object
      properties:
        uid: { type: string }
        libelle_portee: { type: string }
        explication_html: { type: string }
